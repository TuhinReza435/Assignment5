<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <section class="">
      <div class="flex flex-col items-center pt-30">
        <img
          src="./B13-A5-Github-Issue-Tracker/assets/github-logo.png"
          alt=""
          class="mb-5"
        />
        <h2 class="font-bold text-3xl">GitHub Issues Tracker</h2>
        <p class="text-[#64748B]">Sign in to manage your issues</p>
      </div>
      <fieldset class="fieldset w-[90%] pt-5 mx-auto">
        <div >
          <legend class="fieldset-legend text-[20px] pl-2">Username</legend>
          <input id="user-name" type="text" class="input w-full rounded-2xl mb-2" placeholder="Enter Username" "/> <br>
          <p class="label pl-2 text-[16px]">Default : admin</p>
        </div>
         <div>
          <legend class="fieldset-legend text-[20px] pl-2">Password</legend>
          <input id="password" type="text" class="input w-full rounded-2xl mb-2" placeholder="Enter Password" /> <br>
          <p class="label pl-2 text-[16px]">Default : admin123</p>
        </div>
        <button id="btn" class="btn btn-primary">Sign In</button>
      </fieldset>
      <div class="bg-white text-center mt-[20%]">
        <h2><span class="font-bold">Username: </span>admin</h2>
        <h2><span class="font-black">Password:  </span>admin123</h2>
      </div>
    </section>
    <script src="./login.js"></script>
  </body>
</html>
